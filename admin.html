<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЕРМАКЪ — CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">ЕРМАКЪ</div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="products">Товары</a>
      <a href="#" class="nav-item" data-section="collections">Коллекции</a>
      <a href="#" class="nav-item" data-section="orders">Заказы</a>
      <a href="#" class="nav-item" data-section="settings">Настройки</a>
    </nav>
  </aside>

  <main class="main">
    <!-- Products -->
    <section id="sec-products" class="section active">
      <div class="section-header">
        <h1>Товары</h1>
        <button class="btn" id="btn-add-product">+ Добавить товар</button>
      </div>
      <div id="products-grid" class="products-grid"></div>
    </section>

    <!-- Collections -->
    <section id="sec-collections" class="section">
      <div class="section-header">
        <h1>Коллекции</h1>
        <button class="btn" id="btn-add-collection">+ Добавить коллекцию</button>
      </div>
      <div id="collections-list" class="collections-list"></div>
    </section>

    <!-- Orders -->
    <section id="sec-orders" class="section">
      <div class="section-header"><h1>Заказы</h1></div>
      <div class="empty-state">
        <p>📋 Заказы появятся здесь после настройки Telegram-бота</p>
      </div>
    </section>

    <!-- Settings -->
    <section id="sec-settings" class="section">
      <div class="section-header"><h1>Настройки</h1></div>
      <div class="settings-form">
        <h2>Соцсети</h2>
        <label>Telegram<input id="set-tg" type="text" placeholder="@username"></label>
        <label>Instagram<input id="set-ig" type="text" placeholder="link"></label>
        <label>VK<input id="set-vk" type="text" placeholder="link"></label>
        <h2>Hero</h2>
        <label>Заголовок<input id="set-hero-title" type="text"></label>
        <label>Подзаголовок<input id="set-hero-sub" type="text"></label>
        <h2>Философия</h2>
        <label>Текст<textarea id="set-phil-text"></textarea></label>
        <label>Цитата<textarea id="set-phil-quote"></textarea></label>
        <button class="btn" id="btn-save-settings">Сохранить настройки</button>
      </div>
    </section>
  </main>

  <!-- Product Modal -->
  <div id="product-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Добавить товар</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="pf_id">
        <label>Название<input id="pf_name" type="text"></label>
        <label>Описание<textarea id="pf_desc"></textarea></label>
        <div class="row">
          <label>Цена (₽)<input id="pf_price" type="number"></label>
          <label>Старая цена (₽)<input id="pf_oldprice" type="number"></label>
        </div>
        <label>Категория
          <select id="pf_category">
            <option value="Футболки">Футболки</option>
            <option value="Худи">Худи</option>
            <option value="Штаны">Штаны</option>
            <option value="Аксессуары">Аксессуары</option>
          </select>
        </label>
        <label>Размеры
          <div class="checkbox-row">
            <label class="chk"><input type="checkbox" value="S"> S</label>
            <label class="chk"><input type="checkbox" value="M"> M</label>
            <label class="chk"><input type="checkbox" value="L"> L</label>
            <label class="chk"><input type="checkbox" value="XL"> XL</label>
            <label class="chk"><input type="checkbox" value="XXL"> XXL</label>
          </div>
        </label>
        <div class="row">
          <label>Бейдж
            <select id="pf_badge">
              <option value="">Нет</option>
              <option value="Новинка">Новинка</option>
              <option value="Хит">Хит</option>
              <option value="Скидка">Скидка</option>
              <option value="Архив">Архив</option>
            </select>
          </label>
          <label>Emoji<input id="pf_emoji" type="text" maxlength="2"></label>
        </div>
        <label>Фото (drag & drop или кнопка)
          <div id="pf_dropzone" class="dropzone">
            <input type="file" id="pf_fileinput" multiple accept="image/*" hidden>
            <p>Перетащите фото сюда или <span class="gold">нажмите для выбора</span></p>
            <div id="pf_previews" class="previews"></div>
          </div>
        </label>
        <label class="toggle-row">
          <span>Активен</span>
          <label class="switch"><input type="checkbox" id="pf_active" checked><span class="slider"></span></label>
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="btn-delete-product" style="display:none">Удалить</button>
        <button class="btn" id="btn-save-product">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Collection Modal -->
  <div id="collection-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="col-modal-title">Добавить коллекцию</h2>
        <button class="modal-close" id="col-modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="cf_id">
        <label>Название<input id="cf_name" type="text"></label>
        <label>Описание<textarea id="cf_desc"></textarea></label>
        <label>Товары
          <div id="cf_products" class="checkbox-col"></div>
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="btn-delete-collection" style="display:none">Удалить</button>
        <button class="btn" id="btn-save-collection">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
